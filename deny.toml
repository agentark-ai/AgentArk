[graph]
targets = [{ triple = "x86_64-unknown-linux-gnu" }]

[advisories]
version = 2
yanked = "deny"
ignore = [
    # notify 7 -> notify-types 1.0.1; upstream has not released a non-instant path.
    "RUSTSEC-2024-0384",
    # fastembed 5.13.2 -> hf-hub 0.4.3 -> indicatif 0.17.11.
    "RUSTSEC-2025-0119",
    # fastembed/tokenizers and image/ravif currently retain paste transitively.
    "RUSTSEC-2024-0436",
    # teloxide 0.13 macros path; no compatible upstream replacement in this tree.
    "RUSTSEC-2024-0370",
    # teloxide-core 0.10.1 -> reqwest 0.11.27.
    "RUSTSEC-2025-0134",
    # scraper/selectors and wasmtime's internal TOML stack retain fxhash transitively.
    "RUSTSEC-2025-0057",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "bzip2-1.0.6",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LicenseRef-UFL-1.0",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
