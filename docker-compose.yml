# =============================================================================
# AgentArk - AI Agent
# =============================================================================
#
# QUICK START:
#   ./scripts/start.sh   (Linux/Mac)
#   scripts/start.bat    (Windows)
#
# OR manually:
#   ./scripts/start.sh
#   scripts\start.bat
#
# Low-memory systems (2-4 GB RAM):
#   docker compose -f docker-compose.yml -f docker-compose.lowmem.yml up -d
#
# Local source builds:
#   AGENTARK_IMAGE=agentark:dev docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# RESET EVERYTHING:
#   docker compose down -v
#
# YOUR APP DATA IS PRESERVED:
#   - Conversations and memory
#   - Custom skills you create
#   - Settings and API keys
#   - Scheduled tasks
#
# The primary database lives in Postgres and is stored in its own Docker volume.
#
# DATA OWNERSHIP CONTRACT:
#   - User-owned: /app/data/**, /app/config/bootstrap.toml,
#     encrypted settings:* KV, memory/profile/preferences, tasks,
#     /app/data/skills/**, /app/data/cli_skills/**
#   - System-owned: built-in prompt bundles, frontend/runtime image files,
#     default extension packs
#   - Release updates may replace system-owned files. User-owned data is changed
#     only by explicit user actions or future versioned migrations with backups.
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentark-postgres
    restart: unless-stopped
    stop_grace_period: 30s
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        umask 077
        mkdir -p /run/secrets
        if [ ! -s /run/secrets/pg_pw ]; then
          head -c 24 /dev/urandom | od -An -tx1 | tr -d '[:space:]' > /run/secrets/pg_pw
          chmod 0400 /run/secrets/pg_pw
          echo "Generated Postgres password in agentark-secrets volume."
        else
          echo "Reusing existing Postgres password from agentark-secrets volume."
        fi
        if [ ! -s /run/secrets/agentark_master_key ]; then
          head -c 32 /dev/urandom | od -An -tx1 | tr -d '[:space:]' > /run/secrets/agentark_master_key
          chmod 0444 /run/secrets/agentark_master_key
          echo "Generated AgentArk encryption master secret in agentark-secrets volume."
        else
          chmod 0444 /run/secrets/agentark_master_key
          echo "Reusing existing AgentArk encryption master secret from agentark-secrets volume."
        fi
        sync_agentark_postgres_password() {
          (
            set +e
            pg_user="$${POSTGRES_USER:-agentark}"
            pg_db="$${POSTGRES_DB:-agentark}"
            for _ in $(seq 1 120); do
              if pg_isready -q -U "$$pg_user" -d "$$pg_db" >/dev/null 2>&1; then
                pg_pw="$$(cat /run/secrets/pg_pw 2>/dev/null)"
                if [ -n "$$pg_pw" ]; then
                  gosu postgres psql -v ON_ERROR_STOP=1 -U "$$pg_user" -d "$$pg_db" -v role="$$pg_user" -v password="$$pg_pw" >/dev/null 2>&1 <<'SQL'
        SELECT format('ALTER ROLE %I WITH LOGIN PASSWORD %L', :'role', :'password') \gexec
        SQL
                  if [ "$$?" -eq 0 ]; then
                    echo "Synchronized Postgres role password with agentark-secrets volume."
                    exit 0
                  fi
                fi
              fi
              sleep 1
            done
            echo "WARNING: Postgres role password could not be synchronized with agentark-secrets volume." >&2
          ) &
        }
        sync_agentark_postgres_password
        exec docker-entrypoint.sh "$0" "$@"
    command:
      - postgres
      - -c
      - log_checkpoints=off
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_DB=${AGENTARK_POSTGRES_DB:-agentark}
      - POSTGRES_USER=${AGENTARK_POSTGRES_USER:-agentark}
      - POSTGRES_PASSWORD_FILE=/run/secrets/pg_pw
    ports:
      - "127.0.0.1:${AGENTARK_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentark-postgres-data:/var/lib/postgresql/data
      # Postgres owns first-run generation of /run/secrets/pg_pw. Other
      # AgentArk services mount this volume read-only.
      - agentark-secrets:/run/secrets
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=\"$$(cat /run/secrets/pg_pw)\" psql -h 127.0.0.1 -U ${AGENTARK_POSTGRES_USER:-agentark} -d ${AGENTARK_POSTGRES_DB:-agentark} -tAc 'select 1' >/dev/null",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 1s
    # Hard cap so the whole AgentArk stack stays inside a 4 GB / 2.4-core
    # budget (~10% of a 24-core host). Postgres gets the heaviest share
    # after control because it carries every write the agent loop emits.
    cpus: 0.5
    mem_limit: 768m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  agentark-control:
    image: ${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
    container_name: agentark-control
    restart: unless-stopped
    # Main worker: largest share of the 4 GB / 2.4-core stack budget.
    cpus: "${AGENTARK_CONTROL_CPUS:-1.2}"
    mem_limit: "${AGENTARK_CONTROL_MEMORY:-1500m}"
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8990:8990"
      - "127.0.0.1:8992:8992"
      - "127.0.0.1:${AGENTARK_BROWSER_HANDOFF_PORT:-6080}:6080"
    volumes:
      - type: volume
        source: agentark-data
        target: /app/data
        volume:
          nocopy: true
      - type: volume
        source: agentark-config
        target: /app/config
        volume:
          nocopy: true
      - agentark-secrets:/run/secrets:ro
      - ${AGENTARK_WORKSPACE_HOST_DIR:-.}:${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
    depends_on:
      postgres:
        condition: service_healthy
      agentark-executor:
        condition: service_started
      agentark-workspace:
        condition: service_started
      agentark-embeddings:
        condition: service_started
    environment:
      - RUST_LOG=info,sqlx::query=warn,sea_orm=warn,hyper=warn,reqwest=warn
      - AGENTARK_CONFIG=/app/config
      - AGENTARK_DATA=/app/data
      - AGENTARK_WORKSPACE_ROOT=${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      # DB URL is assembled at runtime by docker-entrypoint.sh from the password file
      # written by the Postgres service into the agentark-secrets volume.
      - AGENTARK_POSTGRES_PASSWORD_FILE=/run/secrets/pg_pw
      - AGENTARK_POSTGRES_HOST=postgres
      - AGENTARK_POSTGRES_PORT=5432
      - AGENTARK_POSTGRES_USER=${AGENTARK_POSTGRES_USER:-agentark}
      - AGENTARK_POSTGRES_DB=${AGENTARK_POSTGRES_DB:-agentark}
      - AGENTARK_DB_MAX_CONNECTIONS=${AGENTARK_DB_MAX_CONNECTIONS:-20}
      - AGENTARK_DB_CONNECT_TIMEOUT_SECS=${AGENTARK_DB_CONNECT_TIMEOUT_SECS:-5}
      - AGENTARK_DB_STATEMENT_TIMEOUT_MS=${AGENTARK_DB_STATEMENT_TIMEOUT_MS:-30000}
      - AGENTARK_DB_IDLE_TIMEOUT_SECS=${AGENTARK_DB_IDLE_TIMEOUT_SECS:-300}
      - AGENTARK_DB_SCHEMA=${AGENTARK_DB_SCHEMA:-}
      - AGENTARK_BIND=0.0.0.0:8990
      - AGENTARK_PUBLIC_APP_BIND=${AGENTARK_PUBLIC_APP_BIND:-0.0.0.0:8992}
      - AGENTARK_SELF_IMAGE=${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
      - AGENTARK_RELEASE_REPO=${AGENTARK_RELEASE_REPO:-agentark-ai/AgentArk}
      - AGENTARK_STACK_ROLE=control
      - AGENTARK_EXECUTOR_URL=http://agentark-executor:8991
      - AGENTARK_WORKSPACE_URL=http://agentark-workspace:8992
      - AGENTARK_LOCAL_EMBEDDINGS_URL=http://agentark-embeddings:8993
      - AGENTARK_BROWSER_HANDOFF_PUBLIC_PORT=${AGENTARK_BROWSER_HANDOFF_PORT:-6080}
      - AGENTARK_DEBUG=${AGENTARK_DEBUG:-false}
      - AGENTARK_TUNNEL=${AGENTARK_TUNNEL:-false}
      - AGENTARK_LAN_HELPER_URL=${AGENTARK_LAN_HELPER_URL:-}
      - AGENTARK_LAN_HELPER_TOKEN=${AGENTARK_LAN_HELPER_TOKEN:-}
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8990/health', timeout=1)",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "${AGENTARK_CONTROL_CPUS:-1.2}"
          memory: "${AGENTARK_CONTROL_MEMORY:-1500M}"
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  agentark-embeddings:
    image: ${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
    container_name: agentark-embeddings
    restart: unless-stopped
    # Embedding model load is memory-bound, not CPU-bound — keep the
    # 768 MB headroom but tighten CPU since scoring runs in bursts.
    cpus: "${AGENTARK_EMBEDDINGS_CPUS:-0.2}"
    mem_limit: "${AGENTARK_EMBEDDINGS_MEMORY:-768M}"
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: volume
        source: agentark-data
        target: /app/data
        volume:
          nocopy: true
    environment:
      - RUST_LOG=info,hyper=warn,reqwest=warn
      - AGENTARK_STACK_ROLE=embeddings
      - AGENTARK_EMBEDDINGS_BIND=0.0.0.0:8993
      - AGENTARK_LOCAL_EMBEDDINGS_MODEL=${AGENTARK_LOCAL_EMBEDDINGS_MODEL:-BAAI/bge-small-en-v1.5}
      - AGENTARK_LOCAL_EMBEDDINGS_CACHE_DIR=${AGENTARK_LOCAL_EMBEDDINGS_CACHE_DIR:-/app/prebuilt-embeddings-cache}
      - OMP_NUM_THREADS=${AGENTARK_EMBEDDINGS_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${AGENTARK_EMBEDDINGS_THREADS:-1}
      - MKL_NUM_THREADS=${AGENTARK_EMBEDDINGS_THREADS:-1}
      - RAYON_NUM_THREADS=${AGENTARK_EMBEDDINGS_THREADS:-1}
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8993/health', timeout=1)",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "${AGENTARK_EMBEDDINGS_CPUS:-0.2}"
          memory: "${AGENTARK_EMBEDDINGS_MEMORY:-768M}"
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  agentark-executor:
    image: ${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
    container_name: agentark-executor
    restart: unless-stopped
    cpus: 0.3
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: volume
        source: agentark-data
        target: /app/data
        volume:
          nocopy: true
      - type: volume
        source: agentark-config
        target: /app/config
        volume:
          nocopy: true
      - agentark-secrets:/run/secrets:ro
      - ${AGENTARK_WORKSPACE_HOST_DIR:-.}:${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      agentark-workspace:
        condition: service_started
    environment:
      - RUST_LOG=info,sqlx::query=warn,sea_orm=warn,hyper=warn,reqwest=warn
      - AGENTARK_CONFIG=/app/config
      - AGENTARK_DATA=/app/data
      - AGENTARK_WORKSPACE_ROOT=${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      # DB URL is assembled at runtime by docker-entrypoint.sh from the password file
      # written by the Postgres service into the agentark-secrets volume.
      - AGENTARK_POSTGRES_PASSWORD_FILE=/run/secrets/pg_pw
      - AGENTARK_POSTGRES_HOST=postgres
      - AGENTARK_POSTGRES_PORT=5432
      - AGENTARK_POSTGRES_USER=${AGENTARK_POSTGRES_USER:-agentark}
      - AGENTARK_POSTGRES_DB=${AGENTARK_POSTGRES_DB:-agentark}
      - AGENTARK_DB_MAX_CONNECTIONS=${AGENTARK_DB_MAX_CONNECTIONS:-20}
      - AGENTARK_DB_CONNECT_TIMEOUT_SECS=${AGENTARK_DB_CONNECT_TIMEOUT_SECS:-5}
      - AGENTARK_DB_STATEMENT_TIMEOUT_MS=${AGENTARK_DB_STATEMENT_TIMEOUT_MS:-30000}
      - AGENTARK_DB_IDLE_TIMEOUT_SECS=${AGENTARK_DB_IDLE_TIMEOUT_SECS:-300}
      - AGENTARK_DB_SCHEMA=${AGENTARK_DB_SCHEMA:-}
      - AGENTARK_BIND=0.0.0.0:8990
      - AGENTARK_EXECUTOR_BIND=0.0.0.0:8991
      - AGENTARK_SELF_IMAGE=${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
      - AGENTARK_RELEASE_REPO=${AGENTARK_RELEASE_REPO:-agentark-ai/AgentArk}
      - AGENTARK_STACK_ROLE=executor
      - AGENTARK_CONTROL_URL=http://agentark-control:8990
      - AGENTARK_WORKSPACE_URL=http://agentark-workspace:8992
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AGENTARK_DEBUG=${AGENTARK_DEBUG:-false}
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8991/health', timeout=1)",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  agentark-workspace:
    image: ${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
    container_name: agentark-workspace
    restart: unless-stopped
    cpus: 0.2
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: volume
        source: agentark-data
        target: /app/data
        volume:
          nocopy: true
      - type: volume
        source: agentark-config
        target: /app/config
        volume:
          nocopy: true
      - ${AGENTARK_WORKSPACE_HOST_DIR:-.}:${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
    environment:
      - RUST_LOG=info,sqlx::query=warn,sea_orm=warn,hyper=warn,reqwest=warn
      - AGENTARK_CONFIG=/app/config
      - AGENTARK_DATA=/app/data
      - AGENTARK_STACK_ROLE=workspace
      - AGENTARK_WORKSPACE_ROOT=${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      - AGENTARK_WORKSPACE_BIND=0.0.0.0:8992
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8992/health', timeout=1)",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  agentark-data:
    name: agentark-data
  agentark-config:
    name: agentark-config
  agentark-postgres-data:
    name: agentark-postgres-data
  # Holds generated install secrets (/run/secrets/pg_pw and
  # /run/secrets/agentark_master_key). Docker-managed; never touches the host
  # filesystem. `docker compose down -v` removes it and triggers fresh secrets on
  # next start, so wipe it together with AgentArk data/config/Postgres volumes.
  agentark-secrets:
    name: agentark-secrets
networks:
  agent-network:
    driver: bridge
