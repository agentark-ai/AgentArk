# =============================================================================
# AgentArk - AI Agent
# =============================================================================
#
# QUICK START:
#   ./scripts/start.sh   (Linux/Mac)
#   scripts/start.bat    (Windows)
#
# OR manually:
#   docker compose up -d
#
# Local source builds:
#   AGENTARK_IMAGE=agentark:dev docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# RESET EVERYTHING:
#   docker compose down -v
#
# YOUR APP DATA IS PRESERVED:
#   - Conversations and memory
#   - Custom skills you create
#   - Settings and API keys
#   - Scheduled tasks
#
# The primary database lives in Postgres and is stored in its own Docker volume.
#
# DATA OWNERSHIP CONTRACT:
#   - User-owned: /app/data/**, /app/config/bootstrap.toml,
#     encrypted settings:* KV, memory/profile/preferences, tasks,
#     /app/data/skills/**, /app/data/cli_skills/**
#   - System-owned: built-in prompt bundles, frontend/runtime image files,
#     default extension packs
#   - Release updates may replace system-owned files. User-owned data is changed
#     only by explicit user actions or future versioned migrations with backups.
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentark-postgres
    restart: unless-stopped
    stop_grace_period: 30s
    command:
      - postgres
      - -c
      - log_checkpoints=off
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_DB=${AGENTARK_POSTGRES_DB:-agentark}
      - POSTGRES_USER=${AGENTARK_POSTGRES_USER:-agentark}
      - POSTGRES_PASSWORD=${AGENTARK_POSTGRES_PASSWORD:-agentark}
    ports:
      - "127.0.0.1:${AGENTARK_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentark-postgres-data:/var/lib/postgresql/data
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AGENTARK_POSTGRES_USER:-agentark} -d ${AGENTARK_POSTGRES_DB:-agentark}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  agentark-control:
    image: ${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
    container_name: agentark-control
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8990:8990"
      - "127.0.0.1:8992:8992"
      - "127.0.0.1:${AGENTARK_BROWSER_HANDOFF_PORT:-6080}:6080"
    volumes:
      - agentark-data:/app/data
      - agentark-config:/app/config
      - ${AGENTARK_WORKSPACE_HOST_DIR:-.}:${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
    depends_on:
      postgres:
        condition: service_healthy
      agentark-executor:
        condition: service_healthy
      agentark-workspace:
        condition: service_healthy
    environment:
      - RUST_LOG=info,sqlx::query=warn,sea_orm=warn,hyper=warn,reqwest=warn
      - AGENTARK_CONFIG=/app/config
      - AGENTARK_DATA=/app/data
      - AGENTARK_WORKSPACE_ROOT=${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      - AGENTARK_DATABASE_URL=postgres://${AGENTARK_POSTGRES_USER:-agentark}:${AGENTARK_POSTGRES_PASSWORD:-agentark}@postgres:5432/${AGENTARK_POSTGRES_DB:-agentark}
      - AGENTARK_DB_MAX_CONNECTIONS=${AGENTARK_DB_MAX_CONNECTIONS:-20}
      - AGENTARK_DB_CONNECT_TIMEOUT_SECS=${AGENTARK_DB_CONNECT_TIMEOUT_SECS:-5}
      - AGENTARK_DB_STATEMENT_TIMEOUT_MS=${AGENTARK_DB_STATEMENT_TIMEOUT_MS:-30000}
      - AGENTARK_DB_IDLE_TIMEOUT_SECS=${AGENTARK_DB_IDLE_TIMEOUT_SECS:-300}
      - AGENTARK_DB_SCHEMA=${AGENTARK_DB_SCHEMA:-}
      - AGENTARK_BIND=0.0.0.0:8990
      - AGENTARK_PUBLIC_APP_BIND=${AGENTARK_PUBLIC_APP_BIND:-0.0.0.0:8992}
      - AGENTARK_SELF_IMAGE=${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
      - AGENTARK_STACK_ROLE=control
      - AGENTARK_EXECUTOR_URL=http://agentark-executor:8991
      - AGENTARK_WORKSPACE_URL=http://agentark-workspace:8992
      - AGENTARK_BROWSER_HANDOFF_PUBLIC_PORT=${AGENTARK_BROWSER_HANDOFF_PORT:-6080}
      - AGENTARK_DEBUG=${AGENTARK_DEBUG:-false}
      - AGENTARK_TUNNEL=${AGENTARK_TUNNEL:-false}
      - AGENTARK_LAN_HELPER_URL=${AGENTARK_LAN_HELPER_URL:-}
      - AGENTARK_LAN_HELPER_TOKEN=${AGENTARK_LAN_HELPER_TOKEN:-}
      - AGENTARK_MASTER_PASSWORD=${AGENTARK_MASTER_PASSWORD:-}
      - AGENTARK_SELF_WATCHDOG=${AGENTARK_SELF_WATCHDOG:-true}
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8990/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  agentark-executor:
    image: ${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
    container_name: agentark-executor
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - agentark-data:/app/data
      - agentark-config:/app/config
      - ${AGENTARK_WORKSPACE_HOST_DIR:-.}:${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      agentark-workspace:
        condition: service_healthy
    environment:
      - RUST_LOG=info,sqlx::query=warn,sea_orm=warn,hyper=warn,reqwest=warn
      - AGENTARK_CONFIG=/app/config
      - AGENTARK_DATA=/app/data
      - AGENTARK_WORKSPACE_ROOT=${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      - AGENTARK_DATABASE_URL=postgres://${AGENTARK_POSTGRES_USER:-agentark}:${AGENTARK_POSTGRES_PASSWORD:-agentark}@postgres:5432/${AGENTARK_POSTGRES_DB:-agentark}
      - AGENTARK_DB_MAX_CONNECTIONS=${AGENTARK_DB_MAX_CONNECTIONS:-20}
      - AGENTARK_DB_CONNECT_TIMEOUT_SECS=${AGENTARK_DB_CONNECT_TIMEOUT_SECS:-5}
      - AGENTARK_DB_STATEMENT_TIMEOUT_MS=${AGENTARK_DB_STATEMENT_TIMEOUT_MS:-30000}
      - AGENTARK_DB_IDLE_TIMEOUT_SECS=${AGENTARK_DB_IDLE_TIMEOUT_SECS:-300}
      - AGENTARK_DB_SCHEMA=${AGENTARK_DB_SCHEMA:-}
      - AGENTARK_BIND=0.0.0.0:8990
      - AGENTARK_EXECUTOR_BIND=0.0.0.0:8991
      - AGENTARK_SELF_IMAGE=${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
      - AGENTARK_STACK_ROLE=executor
      - AGENTARK_CONTROL_URL=http://agentark-control:8990
      - AGENTARK_WORKSPACE_URL=http://agentark-workspace:8992
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AGENTARK_DEBUG=${AGENTARK_DEBUG:-false}
      - AGENTARK_MASTER_PASSWORD=${AGENTARK_MASTER_PASSWORD:-}
      - AGENTARK_SELF_WATCHDOG=${AGENTARK_SELF_WATCHDOG:-true}
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8991/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  agentark-workspace:
    image: ${AGENTARK_IMAGE:-ghcr.io/agentark-ai/agentark:latest}
    container_name: agentark-workspace
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - agentark-data:/app/data
      - agentark-config:/app/config
      - ${AGENTARK_WORKSPACE_HOST_DIR:-.}:${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
    environment:
      - RUST_LOG=info,sqlx::query=warn,sea_orm=warn,hyper=warn,reqwest=warn
      - AGENTARK_CONFIG=/app/config
      - AGENTARK_DATA=/app/data
      - AGENTARK_STACK_ROLE=workspace
      - AGENTARK_WORKSPACE_ROOT=${AGENTARK_WORKSPACE_ROOT:-/workspace/agentark}
      - AGENTARK_WORKSPACE_BIND=0.0.0.0:8992
      - AGENTARK_SELF_WATCHDOG=${AGENTARK_SELF_WATCHDOG:-true}
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8992/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  agentark-data:
    name: agentark-data
  agentark-config:
    name: agentark-config
  agentark-postgres-data:
    name: agentark-postgres-data
networks:
  agent-network:
    driver: bridge
