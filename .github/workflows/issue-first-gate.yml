# Enforces the issue-first contribution policy from CONTRIBUTING.md.
#
# Every pull request must reference at least one issue that a maintainer has
# marked with the `approved` label. PRs that do not are commented on and
# closed automatically. Dependabot, maintainers (write permission or higher),
# and security-labeled PRs / branches are exempt.
#
# Uses `pull_request_target` so the gate can close PRs opened from forks. The
# workflow does NOT check out or run PR-authored code, so there is no
# elevated-token exposure on untrusted content.

name: issue-first-gate

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  pull-requests: write
  issues: read
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR references an approved issue
        uses: actions/github-script@v7
        env:
          APPROVED_LABEL: approved
          SECURITY_LABEL: security
          SECURITY_BRANCH_PREFIX: security/
        with:
          script: |
            const approvedLabel = process.env.APPROVED_LABEL;
            const securityLabel = process.env.SECURITY_LABEL;
            const securityBranchPrefix = process.env.SECURITY_BRANCH_PREFIX;
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request payload; nothing to do.');
              return;
            }

            const prNumber = pr.number;
            const prBody = pr.body || '';
            const prHeadRef = pr.head && pr.head.ref ? pr.head.ref : '';
            const authorLogin = pr.user && pr.user.login ? pr.user.login : '';
            const authorAssociation = pr.author_association || '';
            const prLabels = (pr.labels || []).map((label) => label.name);

            // ----- Exemption: bots (dependabot etc.) -----
            if (authorLogin.endsWith('[bot]')) {
              core.info(`Skipping gate — PR author ${authorLogin} is a bot.`);
              return;
            }

            // ----- Exemption: maintainers / repo collaborators with write+ -----
            const privilegedAssociations = new Set([
              'OWNER',
              'MEMBER',
              'COLLABORATOR',
            ]);
            if (privilegedAssociations.has(authorAssociation)) {
              core.info(
                `Skipping gate — PR author has association ${authorAssociation}.`,
              );
              return;
            }

            // ----- Exemption: security PRs (label or branch name) -----
            if (prLabels.includes(securityLabel)) {
              core.info(`Skipping gate — PR carries label "${securityLabel}".`);
              return;
            }
            if (prHeadRef.startsWith(securityBranchPrefix)) {
              core.info(
                `Skipping gate — PR branch ${prHeadRef} starts with "${securityBranchPrefix}".`,
              );
              return;
            }

            // ----- Extract referenced issue numbers from the PR body -----
            //
            // Match GitHub's default closing keywords plus plain "refs #NNN" so
            // contributors can link a discussion issue without closing it.
            const issueRefPattern =
              /\b(?:close[sd]?|closes|fix(?:e[sd])?|resolve[sd]?|refs?)\s*#(\d+)\b/gi;
            const referenced = new Set();
            let match;
            while ((match = issueRefPattern.exec(prBody)) !== null) {
              referenced.add(Number(match[1]));
            }

            if (referenced.size === 0) {
              await closePrWithReason(
                github,
                context,
                prNumber,
                'no_reference',
              );
              core.setFailed(
                'PR body does not reference any issue. See CONTRIBUTING.md.',
              );
              return;
            }

            // ----- At least one referenced issue must carry the approved label -----
            let anyApproved = false;
            const checkedIssues = [];
            for (const issueNumber of referenced) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });
                const labels = (issue.labels || []).map((label) =>
                  typeof label === 'string' ? label : label.name,
                );
                checkedIssues.push({ number: issueNumber, labels });
                if (labels.includes(approvedLabel)) {
                  anyApproved = true;
                  break;
                }
              } catch (error) {
                core.warning(
                  `Could not load issue #${issueNumber}: ${error.message}`,
                );
              }
            }

            if (anyApproved) {
              core.info(
                `PR references an approved issue; gate passes. Checked: ${JSON.stringify(
                  checkedIssues,
                )}`,
              );
              return;
            }

            await closePrWithReason(
              github,
              context,
              prNumber,
              'not_approved',
              checkedIssues,
            );
            core.setFailed(
              'No referenced issue carries the "approved" label. See CONTRIBUTING.md.',
            );

            // ---------- helpers ----------
            async function closePrWithReason(
              github,
              context,
              prNumber,
              reason,
              checked,
            ) {
              const header =
                'Thanks for the pull request. This repository uses an **issue-first contribution policy** — see [CONTRIBUTING.md](CONTRIBUTING.md#issue-first-policy).';
              let body;
              if (reason === 'no_reference') {
                body = [
                  header,
                  '',
                  'This PR does not reference any issue. To move forward:',
                  '',
                  '1. Open an issue describing the problem and the direction in your own words.',
                  '2. Wait for a maintainer to apply the `approved` label.',
                  '3. Open a new PR whose body references the issue with `Fixes #NNN`, `Closes #NNN`, or `Refs #NNN`.',
                  '',
                  'Closing this PR automatically. You can reopen it once the referenced issue is approved.',
                ].join('\n');
              } else {
                const lines = (checked || []).map(
                  (info) =>
                    `  - #${info.number}: labels = \`${info.labels.join('`, `') || '(none)'}\``,
                );
                body = [
                  header,
                  '',
                  'None of the referenced issues carry the `approved` label:',
                  '',
                  ...lines,
                  '',
                  'Wait for a maintainer to apply the `approved` label to one of these issues, then reopen the PR. Closing automatically.',
                ].join('\n');
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed',
              });
            }
