name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentark
          POSTGRES_PASSWORD: agentark
          POSTGRES_DB: agentark
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentark -d agentark"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AGENTARK_DATABASE_URL: postgres://agentark:agentark@127.0.0.1:5432/agentark
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --locked

      - name: cargo clippy
        run: cargo clippy --locked

      - name: cargo test (unit)
        run: cargo test --locked

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            build_args: |
              AGENTARK_DOCKER_FEATURES=telegram,docker,ssh
              INSTALL_PLAYWRIGHT_RUNTIME=false
              INSTALL_MEM0=false
              INSTALL_FFMPEG=false
              INSTALL_TAILSCALE=false
              INSTALL_CLOUDFLARED=false
              INSTALL_LIGHTPANDA=true
              INSTALL_GWS=false
              INSTALL_WHATSAPP_BRIDGE=true
          - variant: full
            build_args: |
              AGENTARK_DOCKER_FEATURES=telegram,docker,ssh
              INSTALL_PLAYWRIGHT_RUNTIME=true
              INSTALL_MEM0=true
              INSTALL_FFMPEG=true
              INSTALL_TAILSCALE=true
              INSTALL_CLOUDFLARED=true
              INSTALL_LIGHTPANDA=true
              INSTALL_GWS=true
              INSTALL_WHATSAPP_BRIDGE=true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.variant }},enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest-${{ matrix.variant }},enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}}-${{ matrix.variant }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.variant }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=AgentArk (${{ matrix.variant }})
            org.opencontainers.image.description=AgentArk container variant: ${{ matrix.variant }}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          platforms: linux/amd64
