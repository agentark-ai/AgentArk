name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AGENTARK_RELEASE_FEATURES: telegram,docker,ssh

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentark
          POSTGRES_PASSWORD: agentark
          POSTGRES_DB: agentark
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentark -d agentark"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AGENTARK_DATABASE_URL: postgres://agentark:agentark@127.0.0.1:5432/agentark
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --locked --no-default-features --features "${{ env.AGENTARK_RELEASE_FEATURES }}"

      - name: cargo clippy
        run: cargo clippy --locked --no-default-features --features "${{ env.AGENTARK_RELEASE_FEATURES }}"

      - name: cargo test
        run: cargo test --locked --no-default-features --features "${{ env.AGENTARK_RELEASE_FEATURES }}"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
